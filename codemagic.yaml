workflows:
  default-workflow:
    name: Build Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Install Flet
        script: |
          pip3 install flet
      - name: Build Flet APK
        script: |
          # هذا الأمر يقوم ببناء التطبيق مباشرة بدون الحاجة لإدخال بيانات
          flet build apk --project main.py
    artifacts:
      - build/apk/android/app-release.apk
