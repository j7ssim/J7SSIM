workflows:
  android-build:
    name: Build Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Set up Python and Flet
        script: |
          pip3 install flet telethon cryptography pysocks
      - name: Build Flet APK
        script: |
          flet build apk --project main.py
    artifacts:
      - build/apk/android/app-release.apk
