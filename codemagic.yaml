workflows:
  default-workflow:
    name: Build Android APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Install dependencies
        script: |
          pip3 install flet telethon cryptography pysocks
      - name: Build Flet APK
        script: |
          flet build apk --project main.py
    artifacts:
      - build/apk/android/app-release.apk
