name: Build Flet APK via Custom Flutter Project

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Force Create Valid Flutter Structure
      run: |
        # صنع مجلد المشروع يدوياً بدون منة من أداة فليت
        mkdir -p flet_project/lib
        
        # كتابة ملف pubspec.yaml الجذري والمطلوب للبناء مباشرة داخل السيرفر
        cat << 'EOF' > flet_project/pubspec.yaml
        name: flet_app
        description: A new Flutter project.
        publish_to: 'none'
        version: 1.0.0+1
        environment:
          sdk: '>=3.0.0 <4.0.0'
        dependencies:
          flutter:
            sdk: flutter
          flet: ^0.26.0
        dev_dependencies:
          flutter_test:
            sdk: flutter
          flutter_lints: ^3.0.0
        flutter:
          uses-material-design: true
          assets:
            - assets/
        EOF

        # صنع ملف الـ main.dart الأساسي للفلاتر بالخلفية
        cat << 'EOF' > flet_project/lib/main.dart
        import 'package:flutter/material.dart';
        void main() => runApp(const MyApp());
        class MyApp extends StatelessWidget {
          const MyApp({super.key});
          @override
          Widget build(BuildContext context) {
            return const MaterialApp(home: Scaffold(body: Center(child: Text('Flet App'))));
          }
        }
        EOF

        # البحث عن كود الـ main.py مالتك الأصلي ونسخه للمجلد
        find . -name "main.py" -not -path "*/flet_project/*" -exec cp {} flet_project/ \; 2>/dev/null || true
        # نسخ ملفات المستخدمين والمستندات إن وجدت
        find . -name "*.txt" -not -path "*/flet_project/*" -exec cp {} flet_project/ \; 2>/dev/null || true

    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Build APK Final Direct
      run: |
        cd flet_project
        # تحميل المكاتب يدوياً للتأكد
        flutter pub get
        # أمر البناء الرسمي الصامت
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-apk
        path: flet_project/build/app/outputs/flutter-apk/app-release.apk
