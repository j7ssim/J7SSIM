name: Deploy Flet as Web Site Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Ensure Main File Is In Root
      run: |
        # إذا كان ملف main.py داخل أي مجلد فرعي، السكريبت راح يجيبه ويخليه بالساحة الرئيسية فوراً
        find . -name "main.py" -maxdepth 3 -exec cp {} . \; 2>/dev/null || true
        find . -name "*.txt" -maxdepth 3 -exec cp {} . \; 2>/dev/null || true

    - name: Build Web Files (Safe & Direct)
      run: |
        # بناء الموقع مع تغذية أمر الإدخال بمدخل فارغ وتحديد المسار الرئيسي
        echo "" | flet build web --module-name main

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build/web
        branch: gh-pages
