name: Build Flet APK Ultimate Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Generate Official Flutter Android Project
      run: |
        # إنشاء مجلد مستقل ونظيف تماماً
        mkdir -p clean_project
        cd clean_project
        
        # أمر فلاتر الرسمي لصنع بيئة أندرويد كاملة بدون نقص ملفات
        flutter create . --org com.j7ssim.app --project-name flet_app --platforms=android
        
        # كتابة إعدادات فليت داخل ملف الـ pubspec.yaml الرسمي
        cat << 'EOF' >> pubspec.yaml
          flet: ^0.26.0
        EOF

    - name: Copy Python Code Files
      run: |
        # نسخ كودك والملفات التابعة لداخل المجلد النظيف
        find . -name "main.py" -not -path "*/clean_project/*" -exec cp {} clean_project/ \; 2>/dev/null || true
        find . -name "*.txt" -not -path "*/clean_project/*" -exec cp {} clean_project/ \; 2>/dev/null || true

    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Build APK Tank Mode
      run: |
        cd clean_project
        # تحديث المكاتب
        flutter pub get
        # بناء الـ APK الرسمي
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-apk
        path: clean_project/build/app/outputs/flutter-apk/app-release.apk
