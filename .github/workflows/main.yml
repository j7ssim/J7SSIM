name: Build Flet APK via Flutter Ultimate

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Prepare Clean Flet Project
      run: |
        # إنشاء مشروع فليت جديد ونظيف تماماً
        flet create flet_project --template app
        
        # البحث عن ملف main.py وين ما جان بالمستودع ونسخه للمكان الصحيح
        find . -name "main.py" -not -path "*/flet_project/*" -exec cp {} flet_project/src/ \; 2>/dev/null || true
        find . -name "main.py" -not -path "*/flet_project/*" -exec cp {} flet_project/ \; 2>/dev/null || true
        
        # نسخ أي ملفات نصية أو تابعة إن وجدت
        find . -name "*.txt" -not -path "*/flet_project/*" -exec cp {} flet_project/src/ \; 2>/dev/null || true
        find . -name "*.txt" -not -path "*/flet_project/*" -exec cp {} flet_project/ \; 2>/dev/null || true

    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Build APK via Flutter Direct
      run: |
        cd flet_project
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-apk
        path: flet_project/build/app/outputs/flutter-apk/app-release.apk
