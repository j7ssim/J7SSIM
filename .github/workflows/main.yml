name: Deploy Flet as Web Site Final Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Force Rename Python File to main.py
      run: |
        # السكريبت راح يبحث عن أول ملف بايثون يلقاه بالمستودع مالتك ويسوي منه نسخة باسم main.py بالوجه
        find . -maxdepth 2 -name "*.py" ! -name "main.py" -exec cp {} ./main.py \; -quit || true
        # نسخ ملفات التكست المرافقة إن وجدت
        find . -maxdepth 2 -name "*.txt" -exec cp {} . \; 2>/dev/null || true

    - name: Build Web Files
      run: |
        # بناء الموقع بأمر صامت ومباشر بعد تجهيز ملف main.py
        echo "" | flet build web

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build/web
        branch: gh-pages
