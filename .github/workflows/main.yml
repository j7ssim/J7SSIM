name: Build Flet APK via Flutter

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet

    - name: Prepare Clean Flet Project
      run: |
        # إنشاء مشروع فليت جديد ونظيف تماماً في مجلد مستقل لمنع أي تعارض
        flet create flet_project --template app
        # نسخ ملفات الكود والبيانات مالتك إلى داخل مجلد المشروع الجديد
        cp -r main.py processed_users.txt flet_project/ 2>/dev/null || cp main.py flet_project/

    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Build APK via Flutter Direct
      run: |
        # الدخول للمجلد النظيف اللي يحتوي على pubspec.yaml والبناء من داخله
        cd flet_project
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-apk
        path: flet_project/build/app/outputs/flutter-apk/app-release.apk
